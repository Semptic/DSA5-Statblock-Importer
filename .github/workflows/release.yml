name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: latest

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Build
        run: pnpm build

      - name: Update module.json with version and download URL
        env:
          TAG: ${{ github.ref_name }}
        run: |
          VERSION="${TAG#v}"
          DOWNLOAD_URL="https://github.com/${{ github.repository }}/releases/download/${TAG}/module.zip"
          jq --arg v "$VERSION" --arg d "$DOWNLOAD_URL" \
            '.version = $v | .download = $d' \
            module.json > module.json.tmp
          mv module.json.tmp module.json

      - name: Create release zip
        run: zip -r module.zip module.json dist/ templates/ styles/ languages/

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          gh release create "$TAG" module.zip \
            --title "DSA5 Statblock Importer $TAG" \
            --generate-notes

      - name: Commit updated module.json to main
        env:
          TAG: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git fetch origin main
          git checkout main
          git add module.json
          git commit -m "chore: update module.json for release ${TAG}"
          git push origin main
